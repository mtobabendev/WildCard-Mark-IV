        #accordion div {
            overflow: hidden;
            height: 0;
            transition: height 1s ease-in-out;
        }

        #accordion div:target {
        height: 7em;
        }
    </style>
</head>

    <div id="accordion">
        <h3><a href="#Q1">Design conferences in 2022</a></h3>
        <div id="Q1"><p class="blog-text">Veritatis et quasi architecto beatae vitae dicta sunt, explicabo.</p></div>
        <h3><a href="#Q2">Best fonts every designer</a></h3>
        <div id="Q2"><p class="blog-text">Sed ut perspiciatis, nam libero tempore, cum soluta nobis est eligendi.</p></div>
      </div>
</body>
</html>
