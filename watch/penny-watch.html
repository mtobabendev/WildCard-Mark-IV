<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Penny Watch</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
    }

    button,
    a,
    video,
    img {
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      background:
        radial-gradient(circle at 50% 40%, rgba(30, 40, 90, 0.22) 0%, rgba(0, 0, 0, 0) 45%),
        radial-gradient(circle at 50% 55%, rgba(130, 30, 255, 0.12) 0%, rgba(0, 0, 0, 0) 55%),
        #000;
    }

    .watch-app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at center, #0a0b14 0%, #020204 58%, #000 100%);
    }

    .system-glow,
    .penny-glow,
    .overlay-vignette,
    .scanlines {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .system-glow {
      z-index: 1;
      opacity: 1;
      transition: opacity 0.45s ease;
      box-shadow:
        inset 0 0 35px rgba(80, 120, 255, 0.16),
        inset 0 0 60px rgba(130, 0, 255, 0.10),
        0 0 30px rgba(80, 120, 255, 0.08);
    }

    .penny-glow {
      z-index: 2;
      opacity: 0;
      transition: opacity 0.45s ease;
      box-shadow:
        inset 0 0 48px rgba(255, 40, 155, 0.24),
        inset 0 0 88px rgba(255, 0, 170, 0.18),
        0 0 32px rgba(255, 0, 150, 0.18);
    }

    .overlay-vignette {
      z-index: 8;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.03) 0%, rgba(0,0,0,0) 28%),
        radial-gradient(circle at center, rgba(0,0,0,0) 45%, rgba(0,0,0,0.35) 78%, rgba(0,0,0,0.72) 100%);
    }

    .scanlines {
      z-index: 9;
      opacity: 0.10;
      background-image: linear-gradient(
        to bottom,
        rgba(255,255,255,0.07) 0px,
        rgba(255,255,255,0.01) 1px,
        rgba(0,0,0,0) 2px
      );
      background-size: 100% 4px;
      mix-blend-mode: screen;
    }

    .watch-app.penny-active .system-glow {
      opacity: 0.18;
    }

    .watch-app.penny-active .penny-glow {
      opacity: 1;
    }

    .watch-app.penny-linger .penny-glow {
      opacity: 0.45;
    }

    .media-stage {
      position: absolute;
      inset: 0;
      z-index: 3;
      overflow: hidden;
    }

    .penny-static,
    .penny-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      transition:
        opacity 0.45s ease,
        transform 0.45s ease,
        filter 0.45s ease;
      will-change: opacity, transform, filter;
    }

    .penny-static {
      opacity: 1;
      z-index: 1;
      filter: saturate(1.02) contrast(1.03) brightness(0.88);
      transform: scale(1.02);
    }

    .penny-video {
      opacity: 0;
      z-index: 2;
      background: transparent;
    }

    .watch-app.penny-active .penny-static {
      opacity: 0.18;
      transform: scale(1.03);
      filter: saturate(1.08) contrast(1.06) brightness(0.72);
    }

    .watch-app.penny-active .penny-video {
      opacity: 1;
      transform: scale(1.005);
    }

    .hud {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .hotspot-wrap {
      position: absolute;
      left: 50%;
      bottom: 11%;
      transform: translateX(-50%);
      pointer-events: auto;
    }

    .hotspot-pulse {
      position: absolute;
      inset: 50% auto auto 50%;
      width: 86px;
      height: 86px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255, 0, 140, 0.24) 0%, rgba(255, 0, 140, 0.08) 38%, rgba(255, 0, 140, 0) 68%);
      filter: blur(4px);
      animation: hotspotPulse 2.8s ease-in-out infinite;
      pointer-events: none;
    }

    .hotspot {
      position: relative;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.14);
      background:
        radial-gradient(circle at 35% 30%, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.03) 24%, rgba(255,255,255,0.02) 100%),
        rgba(8, 10, 20, 0.56);
      backdrop-filter: blur(10px);
      box-shadow:
        0 0 18px rgba(110, 120, 255, 0.18),
        0 0 30px rgba(255, 0, 150, 0.10),
        inset 0 0 14px rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.9);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: grid;
      place-items: center;
      cursor: pointer;
      pointer-events: auto;
      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        border-color 0.18s ease,
        opacity 0.25s ease;
    }

    .hotspot:active {
      transform: scale(0.96);
    }

    .watch-app.penny-active .hotspot {
      opacity: 0.22;
      pointer-events: none;
    }

    @keyframes hotspotPulse {
      0%, 100% {
        opacity: 0.55;
        transform: translate(-50%, -50%) scale(0.92);
      }
      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.08);
      }
    }

    .bubble {
      position: absolute;
      left: 50%;
      bottom: 28%;
      transform: translateX(-50%) translateY(10px);
      width: min(78vw, 255px);
      min-height: 42px;
      padding: 10px 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.12);
      background:
        linear-gradient(180deg, rgba(28, 20, 40, 0.86), rgba(8, 8, 16, 0.88));
      box-shadow:
        0 0 18px rgba(255, 0, 150, 0.18),
        inset 0 0 12px rgba(255,255,255,0.03);
      color: #fff;
      font-size: 12px;
      line-height: 1.3;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 0.28s ease,
        transform 0.28s ease;
      z-index: 12;
    }

    .bubble::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -7px;
      width: 12px;
      height: 12px;
      transform: translateX(-50%) rotate(45deg);
      background: rgba(16, 12, 24, 0.92);
      border-right: 1px solid rgba(255,255,255,0.08);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .bubble.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .panel {
      position: absolute;
      left: 50%;
      bottom: 7%;
      transform: translateX(-50%) translateY(12px);
      width: min(88vw, 280px);
      padding: 10px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
      background:
        linear-gradient(180deg, rgba(15, 16, 28, 0.86), rgba(5, 5, 10, 0.90));
      box-shadow:
        0 0 22px rgba(255, 0, 140, 0.12),
        inset 0 0 16px rgba(255,255,255,0.025);
      backdrop-filter: blur(12px);
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 0.28s ease,
        transform 0.28s ease;
      z-index: 13;
    }

    .panel.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }

    .panel-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .ui-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      min-height: 44px;
      padding: 10px 10px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      color: #fff;
      text-decoration: none;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      transition:
        transform 0.16s ease,
        border-color 0.16s ease,
        box-shadow 0.16s ease,
        background 0.16s ease;
    }

    .ui-btn:active {
      transform: scale(0.97);
    }

    .ui-btn.primary-pink {
      border-color: rgba(255, 70, 170, 0.30);
      box-shadow: 0 0 16px rgba(255, 0, 150, 0.12);
    }

    .ui-btn.primary-blue {
      border-color: rgba(110, 140, 255, 0.30);
      box-shadow: 0 0 16px rgba(80, 120, 255, 0.10);
    }

    .ui-btn.ghost {
      background: rgba(255,255,255,0.03);
    }

    .viewer {
      position: absolute;
      inset: 9% 7% 23% 7%;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background:
        linear-gradient(180deg, rgba(14, 14, 24, 0.86), rgba(5, 5, 10, 0.92));
      box-shadow:
        0 0 26px rgba(255, 0, 150, 0.13),
        inset 0 0 18px rgba(255,255,255,0.025);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transform: scale(0.96);
      transition:
        opacity 0.28s ease,
        transform 0.28s ease;
      z-index: 14;
      overflow: hidden;
    }

    .viewer.show {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .viewer-inner {
      position: absolute;
      inset: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 48%, rgba(0,0,0,0.1) 100%);
    }

    .viewer img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      object-position: center center;
      background: #000;
    }

    .viewer.pass-mode img {
      object-fit: cover;
      object-position: center center;
    }

    .viewer-label {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.45);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.92);
      z-index: 2;
      backdrop-filter: blur(8px);
    }

    .viewer-close {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.42);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      display: grid;
      place-items: center;
      cursor: pointer;
      z-index: 2;
    }

    .status {
      position: absolute;
      top: 4.8%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 11;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.66);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: none;
      backdrop-filter: blur(6px);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="watch-app" id="watchApp">
    <div class="system-glow"></div>
    <div class="penny-glow"></div>

    <div class="media-stage">
      <img
        id="pennyStatic"
        class="penny-static"
        src="../media/penny/images/penny-hot-still.png"
        alt="Penny"
      />

      <video
        id="pennyVideo"
        class="penny-video"
        muted
        playsinline
        preload="metadata"
        poster="../media/penny/images/penny-hot-still.png"
      ></video>

      <audio
        id="pennyWhisper"
        preload="none"
        src="../media/penny/audio/penny-whisper-once.mp3"
      ></audio>
    </div>

    <div class="overlay-vignette"></div>
    <div class="scanlines"></div>

    <div class="hud">
      <div class="status" id="statusText">Penny Link Ready</div>

      <div class="hotspot-wrap">
        <div class="hotspot-pulse"></div>
        <button class="hotspot" id="hotspot" aria-label="Activate Penny">
          PENNY
        </button>
      </div>

      <div class="bubble" id="bubble"></div>

      <!-- Main action panel -->
      <div class="panel" id="mainPanel" aria-hidden="true">
        <div class="panel-grid">
          <button class="ui-btn primary-pink" id="businessCardBtn" type="button">
            Contact QR
          </button>
          <button class="ui-btn primary-blue" id="transitBtn" type="button">
            Transit
          </button>
        </div>
      </div>

      <!-- QR submenu -->
      <div class="panel hidden" id="qrPanel" aria-hidden="true">
        <div class="panel-grid">
          <button class="ui-btn primary-pink" id="websiteQrBtn" type="button">
            Website
          </button>
          <button class="ui-btn primary-blue" id="resumeQrBtn" type="button">
            Resume
          </button>
          <button class="ui-btn ghost" id="qrBackBtn" type="button" style="grid-column: 1 / -1;">
            Back
          </button>
        </div>
      </div>

      <!-- Transit submenu -->
      <div class="panel hidden" id="transitPanel" aria-hidden="true">
        <div class="panel-grid">
          <button class="ui-btn primary-blue" id="busPassBtn" type="button">
            Bus Pass
          </button>
          <a
            class="ui-btn primary-pink"
            id="lyftBtn"
            href="https://ride.lyft.com/"
            target="_blank"
            rel="noopener noreferrer"
          >
            Lyft
          </a>
          <button class="ui-btn ghost" id="transitBackBtn" type="button" style="grid-column: 1 / -1;">
            Back
          </button>
        </div>
      </div>

      <!-- Viewer -->
      <div class="viewer" id="viewer" aria-hidden="true">
        <div class="viewer-label" id="viewerLabel">Viewer</div>
        <button class="viewer-close" id="viewerClose" type="button" aria-label="Close viewer">×</button>
        <div class="viewer-inner">
          <img id="viewerImage" src="" alt="" />
        </div>
      </div>
    </div>
  </div>

  <script>
    const MEDIA = {
      pennyIntroVideo: "../media/penny/video/penny-hot-intro.mp4",
      pennyLoopVideo: "../media/penny/video/penny-hot-loop.mp4",
      pennyStill: "../media/penny/images/penny-hot-still.png",
      whisper: "../media/penny/audio/penny-whisper-once.mp3",

      websiteQR: "../media/penny/qr/penny-website-qr.png",
      resumeQR: "../media/penny/qr/penny-resume-qr.png",

      busPassPlaceholder: "../media/penny/qr/bus-pass-placeholder.png"
    };

    const watchApp = document.getElementById("watchApp");
    const hotspot = document.getElementById("hotspot");
    const bubble = document.getElementById("bubble");
    const statusText = document.getElementById("statusText");

    const pennyStatic = document.getElementById("pennyStatic");
    const pennyVideo = document.getElementById("pennyVideo");
    const pennyWhisper = document.getElementById("pennyWhisper");

    const mainPanel = document.getElementById("mainPanel");
    const qrPanel = document.getElementById("qrPanel");
    const transitPanel = document.getElementById("transitPanel");

    const businessCardBtn = document.getElementById("businessCardBtn");
    const transitBtn = document.getElementById("transitBtn");

    const websiteQrBtn = document.getElementById("websiteQrBtn");
    const resumeQrBtn = document.getElementById("resumeQrBtn");
    const qrBackBtn = document.getElementById("qrBackBtn");

    const busPassBtn = document.getElementById("busPassBtn");
    const transitBackBtn = document.getElementById("transitBackBtn");

    const viewer = document.getElementById("viewer");
    const viewerLabel = document.getElementById("viewerLabel");
    const viewerImage = document.getElementById("viewerImage");
    const viewerClose = document.getElementById("viewerClose");

    const state = {
      active: false,
      currentMode: "idle",
      interactionIndex: 0,
      whisperPlayed: false,
      isViewerOpen: false,
      bubbleTimer: null,
      exitTimer: null
    };

    const introLines = [
      "Hey... there you are.",
      "That’s better. Keep your eyes on me.",
      "Need something useful, honey?",
      "Pick your shortcut."
    ];

    const recallLines = [
      "Back already? I noticed.",
      "You do make a habit of finding me.",
      "Say the word. I’ll make this easy."
    ];

    const qrLines = [
      "Take me with you.",
      "Choose what you want them to keep."
    ];

    const transitLines = [
      "Transit options, coming right up.",
      "Choose your move."
    ];

    function init() {
      pennyStatic.src = MEDIA.pennyStill;
      pennyVideo.poster = MEDIA.pennyStill;
      pennyWhisper.src = MEDIA.whisper;

      pennyVideo.src = MEDIA.pennyIntroVideo;
      pennyVideo.loop = false;
      pennyVideo.preload = "metadata";
      pennyVideo.addEventListener("ended", handleVideoEnded);

      hotspot.addEventListener("click", onHotspotPress);

      businessCardBtn.addEventListener("click", openQrPanel);
      transitBtn.addEventListener("click", openTransitPanel);

      websiteQrBtn.addEventListener("click", openWebsiteQR);
      resumeQrBtn.addEventListener("click", openResumeQR);
      qrBackBtn.addEventListener("click", backToMainPanelFromQR);

      busPassBtn.addEventListener("click", openBusPass);
      transitBackBtn.addEventListener("click", backToMainPanelFromTransit);

      viewerClose.addEventListener("click", closeViewer);
      viewer.addEventListener("click", (event) => {
        if (event.target === viewer) closeViewer();
      });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden && state.active) {
          pennyVideo.pause();
        } else if (!document.hidden && state.active) {
          safePlayVideo();
        }
      });

      updateStatus("Penny Link Ready");
    }

    function updateStatus(text) {
      statusText.textContent = text;
    }

    function showBubble(text, duration = 1800) {
      clearTimeout(state.bubbleTimer);
      bubble.textContent = text;
      bubble.classList.add("show");

      state.bubbleTimer = setTimeout(() => {
        bubble.classList.remove("show");
      }, duration);
    }

    function hideBubble() {
      clearTimeout(state.bubbleTimer);
      bubble.classList.remove("show");
    }

    function safePlayVideo() {
      const playAttempt = pennyVideo.play();
      if (playAttempt && typeof playAttempt.catch === "function") {
        playAttempt.catch(() => {});
      }
    }

    function playIntroVideo() {
      state.currentMode = "intro";
      pennyVideo.pause();
      pennyVideo.src = MEDIA.pennyIntroVideo;
      pennyVideo.loop = false;
      pennyVideo.currentTime = 0;
      pennyVideo.load();
      safePlayVideo();
    }

    function playLoopVideo() {
      state.currentMode = "loop";
      pennyVideo.pause();
      pennyVideo.src = MEDIA.pennyLoopVideo;
      pennyVideo.loop = true;
      pennyVideo.currentTime = 0;
      pennyVideo.load();
      safePlayVideo();
    }

    function handleVideoEnded() {
      if (state.currentMode === "intro" && state.active) {
        playLoopVideo();
        revealMainPanel();
      }
    }

    function playWhisperOnceEver() {
      if (state.whisperPlayed) return;
      state.whisperPlayed = true;

      try {
        pennyWhisper.currentTime = 0;
        const audioAttempt = pennyWhisper.play();
        if (audioAttempt && typeof audioAttempt.catch === "function") {
          audioAttempt.catch(() => {});
        }
      } catch (error) {}
    }

    function onHotspotPress() {
      if (!state.active) {
        activatePenny();
        return;
      }

      if (state.isViewerOpen) {
        closeViewer();
        return;
      }

      if (
        !mainPanel.classList.contains("show") &&
        !qrPanel.classList.contains("show") &&
        !transitPanel.classList.contains("show")
      ) {
        revealMainPanel(true);
        return;
      }

      rotateRecallLine();
    }

    function activatePenny() {
      clearTimeout(state.exitTimer);

      state.active = true;
      state.interactionIndex = 0;
      state.isViewerOpen = false;
      state.currentMode = "intro";

      watchApp.classList.add("penny-active");
      watchApp.classList.remove("penny-linger");

      hideAllPanels();
      hideViewer();

      updateStatus("Penny Engaged");
      showBubble(introLines[0], 2200);

      playWhisperOnceEver();
      playIntroVideo();
      resetInactivityTimer();
    }

    function rotateRecallLine() {
      const line = recallLines[state.interactionIndex % recallLines.length];
      state.interactionIndex += 1;
      showBubble(line, 1600);
    }

    function hideAllPanels() {
      [mainPanel, qrPanel, transitPanel].forEach((panel) => {
        panel.classList.remove("show");
        panel.classList.add("hidden");
        panel.setAttribute("aria-hidden", "true");
      });
    }

    function revealMainPanel(isRecall = false) {
      hideViewer();
      hideAllPanels();

      mainPanel.classList.remove("hidden");
      mainPanel.classList.add("show");
      mainPanel.setAttribute("aria-hidden", "false");

      state.currentMode = "menu";
      updateStatus("Quick Actions Ready");

      if (isRecall) {
        showBubble("Miss me? Pick your shortcut.", 1600);
      } else {
        showBubble(introLines[3], 1600);
      }
    }

    function openQrPanel() {
      hideViewer();
      hideAllPanels();

      qrPanel.classList.remove("hidden");
      qrPanel.classList.add("show");
      qrPanel.setAttribute("aria-hidden", "false");

      state.currentMode = "qr";
      updateStatus("Contact QR Options");
      showBubble(qrLines[0], 1600);
    }

    function backToMainPanelFromQR() {
      revealMainPanel(true);
    }

    function openTransitPanel() {
      hideViewer();
      hideAllPanels();

      transitPanel.classList.remove("hidden");
      transitPanel.classList.add("show");
      transitPanel.setAttribute("aria-hidden", "false");

      state.currentMode = "transit";
      updateStatus("Transit Options");
      showBubble(transitLines[0], 1600);
    }

    function backToMainPanelFromTransit() {
      revealMainPanel(true);
    }

    function showViewer(src, label, alt, passMode = false) {
      state.isViewerOpen = true;
      state.currentMode = "viewer";

      viewerLabel.textContent = label;
      viewerImage.src = src;
      viewerImage.alt = alt;

      if (passMode) {
        viewer.classList.add("pass-mode");
      } else {
        viewer.classList.remove("pass-mode");
      }

      viewer.classList.add("show");
      viewer.setAttribute("aria-hidden", "false");

      hideAllPanels();
      updateStatus(label);
      resetInactivityTimer();
    }

    function hideViewer() {
      state.isViewerOpen = false;
      viewer.classList.remove("show", "pass-mode");
      viewer.setAttribute("aria-hidden", "true");
      viewerImage.src = "";
      viewerImage.alt = "";
    }

    function closeViewer() {
      hideViewer();

      if (state.active) {
        if (state.currentMode === "viewer") {
          revealMainPanel(true);
        } else {
          revealMainPanel(true);
        }
      }
    }

    function openWebsiteQR() {
      showBubble("Website ready. Let them scan.", 1500);
      showViewer(
        MEDIA.websiteQR,
        "Website QR",
        "WildCard DEV website QR code",
        false
      );
    }

    function openResumeQR() {
      showBubble("Resume ready. Nice and clean.", 1500);
      showViewer(
        MEDIA.resumeQR,
        "Resume QR",
        "Resume QR code",
        false
      );
    }

    function openBusPass() {
      showBubble("Bus pass ready.", 1500);
      showViewer(
        MEDIA.busPassPlaceholder,
        "Bus Pass",
        "Bus pass placeholder image",
        true
      );
    }

    function exitPenny() {
      hideBubble();
      hideAllPanels();
      hideViewer();

      state.active = false;
      state.currentMode = "idle";
      state.interactionIndex = 0;

      pennyVideo.pause();
      pennyVideo.currentTime = 0;

      watchApp.classList.remove("penny-active");
      watchApp.classList.add("penny-linger");

      updateStatus("Link Closed");

      clearTimeout(state.exitTimer);
      state.exitTimer = setTimeout(() => {
        watchApp.classList.remove("penny-linger");
        updateStatus("Penny Link Ready");
      }, 1200);
    }

    let inactivityTimer = null;

    function resetInactivityTimer() {
      clearTimeout(inactivityTimer);

      if (!state.active) return;

      inactivityTimer = setTimeout(() => {
        showBubble("I’ll be right here when you need me.", 1600);
        setTimeout(exitPenny, 700);
      }, 22000);
    }

    ["click", "touchstart"].forEach((eventName) => {
      document.addEventListener(eventName, () => {
        if (state.active) resetInactivityTimer();
      }, { passive: true });
    });

    let touchStartY = 0;
    let touchEndY = 0;

    document.addEventListener("touchstart", (e) => {
      if (!e.touches || !e.touches[0]) return;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    document.addEventListener("touchend", (e) => {
      if (!e.changedTouches || !e.changedTouches[0]) return;
      touchEndY = e.changedTouches[0].clientY;

      const deltaY = touchEndY - touchStartY;

      if (state.active && deltaY > 65 && !state.isViewerOpen) {
        showBubble("Alright, honey. Closing link.", 1200);
        setTimeout(exitPenny, 450);
      }
    }, { passive: true });

    init();
  </script>
</body>
</html>
